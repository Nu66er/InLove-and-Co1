kind = "web"
previewPath = "/"
title = "InLove & Co."
version = "1.0.0"
id = "artifacts/luxe-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21248

[services.development]
run = "pnpm --filter @workspace/luxe-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxe-store", "run", "build" ]
publicDir = "artifacts/luxe-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21248"
BASE_PATH = "/"
